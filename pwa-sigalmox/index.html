<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1409">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SIGALMOX — Retirada</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div>
        <h1>SIGALMOX</h1>
        <p class="sub">Retirada física · Santa Virgínia</p>
      </div>
      <div id="network-status" class="network online">Online</div>
    </div>
  </header>

  <main>
    <section class="scan-section">
      <button id="btn-scan" class="btn-scan">📷 Escanear QR Code</button>
      <div id="qr-reader" class="qr-reader hidden"></div>
      <div class="manual-input">
        <label for="codigo-manual">Ou digite o código SAP</label>
        <div class="input-row">
          <input id="codigo-manual" type="text" placeholder="Ex: 02076 ou SIGALMOX-02076" autocomplete="off">
          <button id="btn-buscar" class="btn-secondary">Buscar</button>
        </div>
      </div>
    </section>

    <section id="produto-card" class="produto-card hidden">
      <div class="produto-header">
        <span id="prod-codigo" class="prod-codigo"></span>
        <span id="prod-saldo" class="prod-saldo"></span>
      </div>
      <p id="prod-descricao" class="prod-descricao"></p>
      <p id="prod-categoria" class="prod-categoria"></p>

      <form id="form-retirada">
        <div class="field">
          <label for="quantidade">Quantidade</label>
          <input id="quantidade" type="number" min="0.001" step="0.001" value="1" required>
        </div>
        <div class="field">
          <label for="destino">Destino</label>
          <select id="destino" required>
            <option value="">Carregando...</option>
          </select>
        </div>
        <div class="field">
          <label for="responsavel">Quem retirou</label>
          <select id="responsavel" required>
            <option value="">Carregando...</option>
          </select>
        </div>
        <div class="field">
          <label for="observacao">Observação (opcional)</label>
          <input id="observacao" type="text" placeholder="Ex: urgência curral 3">
        </div>
        <button type="submit" class="btn-primary">✓ Confirmar retirada</button>
      </form>
    </section>

    <section class="recent-section">
      <h2>Retiradas recentes</h2>
      <ul id="recent-list" class="recent-list"></ul>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="config.js?v=1"></script>
  <script src="app.js?v=1"></script>
</body>
</html>
